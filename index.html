<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Terkunci Total</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Arial', sans-serif; color: white;
        }

        /* Overlay Awal agar Browser mengizinkan trap */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; text-align: center;
        }

        .lock-box {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; padding: 20px;
        }

        .clue-box {
            background: #222; border: 2px solid #ff4757;
            padding: 20px; border-radius: 15px; margin-bottom: 20px;
        }

        input {
            padding: 15px; font-size: 20px; width: 250px;
            border-radius: 10px; border: none; text-align: center;
            margin-bottom: 15px;
        }

        button {
            padding: 15px 40px; font-size: 18px; font-weight: bold;
            background: #ff4757; color: white; border: none;
            border-radius: 10px; cursor: pointer;
        }

        .warning { color: yellow; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>⚠️ WOI AYO CLICK INI GUYS⚠️</h1>
        <p>click aja yang button di bawah ini.</p>
        <button onclick="startTrap()">MASUK MODE FAST</button>
    </div>

    <div class="lock-box">
        <div class="clue-box">
            <h3>PERTANYAAN KEAMANAN:</h3>
            <p style="font-size: 1.2em; color: #eccc68;">"13 ÷ 2 = ???"</p>
            <p>CEPAT MASA KAMU TIDAK BISA KAMU UDAH GEDE!</p>
        </div>

        <input type="number" id="jawaban" placeholder="Ketik angka..." step="0.1">
        <button onclick="verifikasi()">BUKA KUNCI</button>
        
        <p class="warning">Tombol navigasi HP kamu telah dinonaktifkan sistem.</p>
    </div>

    <script>
        // Fungsi untuk mengunci history secara agresif
        function lockHistory() {
            window.history.pushState(null, "", window.location.href);
            window.onpopstate = function() {
                // Setiap kali user tekan back, kita paksa balik lagi
                window.history.pushState(null, "", window.location.href);
                alert("Sistem Terkunci! Masukkan jawaban untuk keluar.");
            };
        }

        // Fungsi mulai (dipicu klik pertama)
        function startTrap() {
            document.getElementById('overlay').style.display = 'none';
            
            // Masuk Fullscreen
            let elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();

            // Jalankan trap history
            lockHistory();
            
            // Re-lock setiap 1 detik untuk memastikan history tetap penuh
            setInterval(function() {
                window.history.pushState(null, "", window.location.href);
            }, 1000);
        }

        function verifikasi() {
            const input = document.getElementById('jawaban').value;
            
            // Jawaban matematika: 6.5
            if (input === "6.5") {
                alert("Jawaban Benar! Akses diberikan.");
                window.onpopstate = null; // Matikan trap
                window.location.replace("https://www.google.com");
            } else {
                alert("SALAH! Belajar matematika lagi sana!");
            }
        }

        // Mencegah klik kanan dan beberapa shortcut keyboard
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>
</body>
</html>
