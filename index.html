<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SISTEM TERKUNCI</title>
    
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #00ff00; font-family: monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .box {
            border: 2px solid #00ff00; padding: 30px; text-align: center; border-radius: 10px;
            background: rgba(0, 50, 0, 0.2); width: 80%;
        }
        input {
            background: #000; border: 1px solid #00ff00; color: #00ff00;
            padding: 10px; font-size: 20px; width: 100%; text-align: center; margin: 15px 0;
        }
        button {
            background: #00ff00; color: #000; border: none; font-weight: bold;
            padding: 10px 20px; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>CORE SYSTEM LOCKED</h2>
        <p>Selesaikan persamaan untuk akses keluar:</p>
        <p style="font-size: 20px; color: yellow;">13 ÷ 2 = ???</p>
        <input type="number" id="pass" step="0.1" placeholder="RESULT">
        <button onclick="unlock()">ACCESS EXIT</button>
    </div>

    <script>
        // TRAP 1: Mencegah tombol back dengan looping history
        function push() {
            window.history.pushState(null, null, window.location.href);
        }
        push();
        window.onpopstate = function() {
            push();
            alert("SISTEM TERKUNCI! MASUKKAN KODE!");
        };

        // TRAP 2: Fullscreen paksa setiap kali layar disentuh
        document.addEventListener('click', function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e => {});
            }
        });

        // LOGIKA PASSWORD
        function unlock() {
            const val = document.getElementById('pass').value;
            // Jawaban 6.5
            if (val === "6.5") {
                alert("ACCESS GRANTED. GOODBYE.");
                window.onpopstate = null;
                window.location.replace("https://www.google.com");
            } else {
                alert("SALAH! CEPAT JAWAB, MASA GAK BISA? UDAH GEDE!");
            }
        }

        // TRAP 3: Mencegah refresh/tutup tab
        window.onbeforeunload = function() {
            return "Kamu tidak bisa keluar begitu saja!";
        };
    </script>
</body>
</html>
